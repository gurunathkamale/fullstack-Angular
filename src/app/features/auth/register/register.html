<div class="container mt-3">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">
            Register Form
        </h2>

        <form (ngSubmit)="onSubmit()" [formGroup]="registerForm">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" name="name" id="name" formControlName="name"
                class="form-control" [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                <div class="invalid-feedback">
                    <small *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">Name is Required</small>
                </div>
                 <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" id="email" formControlName="email"
                class="form-control" [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                <div class="invalid-feedback">
                    <small *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">Email is Required</small>
                </div>
            </div>
             <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" formControlName="password"
                class="form-control" [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                <div class="invalid-feedback">
                    <small *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">Password is Required</small>
                </div>
            </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary btn-sm">Register</button>
            </div>
        </form>
    </div>
</div>
