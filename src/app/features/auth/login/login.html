<div class="container mt-3">
    <div class="card p-4 shadow">
        <h2 class="text-center">Login Form</h2>
        <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" id="email" formControlName="email" class="form-control"
                [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <div class="invalid-feedback">
                    <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">email is required</small>
                </div>
            </div>
             <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" formControlName="password" class="form-control"
                [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <div class="invalid-feedback">
                    <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">password is required</small>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary btn-sm">Login</button>
            </div>
        </form>
    </div>
</div>
